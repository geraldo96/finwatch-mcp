version: "3.9"

services:
  mcp-server:
    build: .
    ports:
      - "8080:8080"
    env_file: .env
    volumes:
      - ./data:/app/data
    command: python -m src.mcp_server.server
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

